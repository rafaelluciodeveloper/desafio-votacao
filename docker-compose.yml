# PostgreSQL para cenarios de producao / testes de performance (Tarefa Bonus 2).
# Uso: docker compose up -d  e  mvn spring-boot:run -Dspring-boot.run.profiles=postgres
services:
  postgres:
    image: postgres:16-alpine
    container_name: votacao-postgres
    environment:
      POSTGRES_DB: votacao
      POSTGRES_USER: votacao
      POSTGRES_PASSWORD: votacao
    ports:
      - "5432:5432"
    volumes:
      - votacao-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U votacao"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  votacao-pgdata:
